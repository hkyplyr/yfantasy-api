# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --locked --all-extras --dev

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        uvx flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        uvx flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test w/ Coverage
      run: |
        uv run pytest --cov=yfantasy_api --cov-report term-missing --cov-fail-under=100
